version: "2"
linters:
  default: all
  disable:
    - bodyclose
    - cyclop
    - dupl
    - err113
    - exhaustive
    - exhaustruct
    - forbidigo
    - lll
    - mnd
    - nlreturn
    - noctx
    - paralleltest
    - rowserrcheck
    - sqlclosecheck
    - testpackage
    - tparallel
    - varnamelen
    - wrapcheck
    - wsl
  settings:
    funlen:
      lines: -1
      statements: 50
    goconst:
      min-len: 5
      min-occurrences: 4
    gocyclo:
      min-complexity: 15
    godox:
      keywords:
        - FIXME
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US

    depguard:
      rules:
        main:
          files:
            - $all
            - "!$test"
          allow:
            - $gostd
            - github.com/IncSW/geoip2
        test:
          files:
            - "$test"
          allow:
            - $gostd
            - github.com/traefik-plugins/traefikgeoip2
  exclusions:
    generated: lax
    rules:
      - linters:
          - gochecknoglobals
        path: middleware.go
      - linters:
          - funlen
          - goconst
          - godot
        path: (.+)_test.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
